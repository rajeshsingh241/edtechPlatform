services:
  # ── Backend (Express API) ──────────────────────────────────────
  - type: web
    name: edtech-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FOLDER_NAME
        value: uploads
      - key: MAIL_HOST
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: CLOUD_NAME
        sync: false
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false

  # ── Frontend (React Static Site) ──────────────────────────────
  - type: web
    name: edtech-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
